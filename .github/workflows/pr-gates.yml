name: PR Gates

on:
  pull_request:
    branches: [main]

# No GCP access — gates only. (The WIF provider restricts auth to
# main anyway; PRs cannot authenticate to GCP by design.)
permissions:
  contents: read

jobs:
  backend-gates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --all-extras --dev
      - name: Ruff
        run: uv run ruff check src/ tests/
      - name: Bandit
        run: uv run bandit -r src/
      - name: Mypy (scoped to services/voice/ only — see pyproject.toml [tool.mypy])
        run: uv run mypy src/sport_slot/services/voice
      - name: Pytest (coverage gate >=90%)
        run: uv run pytest --cov=src --cov-fail-under=90 -q
      # warn-only until first triage pass; ratchet to blocking is backlog
      # item CI-AUDIT-RATCHET (measured gates over aspirational thresholds)
      - name: pip-audit (dependency vulnerability scan, non-blocking)
        continue-on-error: true
        run: |
          uv export --frozen --all-extras --dev --no-hashes -o requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt

  frontend-gates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
      # warn-only until first triage pass; ratchet to blocking is backlog
      # item CI-AUDIT-RATCHET (measured gates over aspirational thresholds)
      - name: pnpm audit (dependency vulnerability scan, non-blocking)
        continue-on-error: true
        run: pnpm audit --audit-level=high

  image-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image (local only, no push — mirrors backend/cloudbuild.yaml's build step)
        run: docker build -t sport-slot-api:pr-scan backend
      # warn-only until first triage pass; ratchet to blocking is backlog
      # item CI-AUDIT-RATCHET (measured gates over aspirational thresholds)
      - name: Trivy image scan (container vulnerability scan, non-blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: sport-slot-api:pr-scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (blocking secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
