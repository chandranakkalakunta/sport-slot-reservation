name: Deploy (main)

on:
  push:
    branches: [main]

# id-token:write is REQUIRED for the OIDC token used by WIF auth.
permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: sport-slot-dev
  REGION: asia-south1
  WIF_PROVIDER: projects/707808711911/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider

jobs:
  # Gates run again on main — defense in depth: even a direct push
  # to main (if branch protection were bypassed) cannot deploy broken code.
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Backend gates
        working-directory: backend
        run: |
          uv python install 3.12
          uv sync --all-extras --dev
          uv run ruff check src/ tests/
          uv run bandit -r src/
          uv run pytest --cov=src --cov-fail-under=90 -q
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Frontend gates
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm lint && pnpm test && pnpm build

  deploy:
    needs: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF, keyless)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Node (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build + push backend, deploy Cloud Run
        env:
          CI: "true"
        run: |
          make build-push
          make deploy-dev

      # Direct-WIF federated tokens are rejected by the Firebase Hosting REST
      # API (401 UNAUTHENTICATED). Mint a real OAuth2 access token by
      # impersonating sa-firebase-admin (which has Firebase perms). The main
      # auth step above stays direct-WIF for gcloud build/run commands.
      - name: Mint Firebase access token (SA impersonation)
        id: fb_auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: sa-firebase-admin@sport-slot-dev.iam.gserviceaccount.com
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform

      - name: Deploy Firebase Hosting (REST API, SA-impersonated token)
        env:
          FIREBASE_ACCESS_TOKEN: ${{ steps.fb_auth.outputs.access_token }}
          FIREBASE_PROJECT: sport-slot-dev
        run: |
          (cd frontend && pnpm build)
          ./scripts/deploy_hosting_rest.sh
