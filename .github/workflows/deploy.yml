name: Deploy (main)

on:
  push:
    branches: [main]

# id-token:write is REQUIRED for the OIDC token used by WIF auth.
permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: sport-slot-dev
  REGION: asia-south1
  WIF_PROVIDER: projects/707808711911/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider

jobs:
  # Gates run again on main — defense in depth: even a direct push
  # to main (if branch protection were bypassed) cannot deploy broken code.
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Backend gates
        working-directory: backend
        run: |
          uv python install 3.12
          uv sync --all-extras --dev
          uv run ruff check src/ tests/
          uv run bandit -r src/
          uv run pytest --cov=src --cov-fail-under=90 -q
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Frontend gates
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm lint && pnpm test && pnpm build

  deploy:
    needs: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF, keyless)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Node (for frontend build + firebase-tools)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      # firebase-tools is not bundled with ubuntu-latest or the frontend
      # devDeps — install globally. Uses WIF ADC (GOOGLE_APPLICATION_CREDENTIALS
      # set by auth@v3 above); no interactive `firebase login` needed.
      - name: Install firebase-tools
        run: npm install -g firebase-tools

      # Install frontend deps so deploy_hosting.sh's `pnpm build` succeeds.
      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build + push backend image, deploy Cloud Run, deploy Hosting
        env:
          CI: "true"   # skips the interactive DEPLOY prompts (STEP 1)
        run: |
          make build-push
          make deploy-dev
          make deploy-hosting
