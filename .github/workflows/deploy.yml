name: Deploy (main)

on:
  push:
    branches: [main]

# id-token:write is REQUIRED for the OIDC token used by WIF auth.
permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: sport-slot-dev
  REGION: asia-south1
  WIF_PROVIDER: projects/707808711911/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider

jobs:
  # Gates run again on main — defense in depth: even a direct push
  # to main (if branch protection were bypassed) cannot deploy broken code.
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Backend gates
        working-directory: backend
        run: |
          uv python install 3.12
          uv sync --all-extras --dev
          uv run ruff check src/ tests/
          uv run bandit -r src/
          uv run pytest --cov=src --cov-fail-under=90 -q
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Frontend gates
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm lint && pnpm test && pnpm build

  deploy:
    needs: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF, keyless)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Node (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build + push backend, deploy Cloud Run
        env:
          CI: "true"
          BUILD_ID: ${{ github.sha }}
        run: |
          make build-push
          make deploy-dev

      # Direct-WIF federated tokens are rejected by the Firebase Hosting REST
      # API (401 UNAUTHENTICATED). Mint a real OAuth2 access token by
      # impersonating sa-firebase-admin (which has Firebase perms). The main
      # auth step above stays direct-WIF for gcloud build/run commands.
      - name: Mint Firebase access token (SA impersonation)
        id: fb_auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: sa-firebase-admin@sport-slot-dev.iam.gserviceaccount.com
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform

      - name: Deploy Firebase Hosting (REST API, SA-impersonated token)
        env:
          FIREBASE_ACCESS_TOKEN: ${{ steps.fb_auth.outputs.access_token }}
          FIREBASE_PROJECT: sport-slot-dev
        run: |
          (cd frontend && pnpm build)
          ./scripts/deploy_hosting_rest.sh

      # Step 7 (SA impersonation) overwrote ADC to sa-firebase-admin, which has no
      # GCS write permission. Re-authenticate as the direct WIF principal (identical
      # config to the workflow's first auth step) to restore storage.admin access.
      - name: Re-authenticate to Google Cloud (WIF, keyless — GCS sync)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}

      # Sync frontend/dist/ to GCS with per-file Cache-Control headers matching
      # firebase.json's existing pattern. dist/ was built in the previous step.
      # Groups:
      #   no-cache   — root named files (index.html, SW, manifest, workbox)
      #   immutable  — content-hashed /assets/** (old hashes kept, not deleted,
      #                so users with a cached index.html can still fetch them)
      #   1-day      — PWA icon PNGs (fixed filenames, not hash-versioned)
      #   excluded   — slotsense-icon-source.png (raw source artifact)
      - name: Sync frontend dist to GCS (sport-slot-dev-frontend)
        run: |
          BUCKET=gs://sport-slot-dev-frontend

          # Group 1: no-cache — named root files (change every deploy)
          gcloud storage cp \
            frontend/dist/index.html \
            frontend/dist/manifest.webmanifest \
            frontend/dist/sw.js \
            frontend/dist/registerSW.js \
            "${BUCKET}/" \
            --cache-control="no-cache"
          # workbox filename carries a content hash but matches /workbox-*.js →
          # no-cache in firebase.json; shell expands the glob at runtime
          gcloud storage cp frontend/dist/workbox-*.js "${BUCKET}/" \
            --cache-control="no-cache"

          # Group 2: immutable — content-hashed assets (JS, CSS, fonts)
          gcloud storage cp --cache-control="public, max-age=31536000, immutable" \
            frontend/dist/assets/* "${BUCKET}/assets/"

          # Group 3: 1-day cache — PWA icon PNGs (fixed filenames, not hash-versioned)
          gcloud storage cp \
            frontend/dist/favicon-32x32.png \
            frontend/dist/pwa-192x192.png \
            frontend/dist/pwa-512x512.png \
            frontend/dist/pwa-maskable-512x512.png \
            "${BUCKET}/" \
            --cache-control="public, max-age=86400"
          # slotsense-icon-source.png deliberately excluded (raw source artifact)
